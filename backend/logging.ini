[loggers]
keys=root,backend

[handlers]
keys=file_handler,console_handler

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=file_handler

[logger_backend]
level=INFO
handlers=file_handler,console_handler
qualname=backend
propagate=0

[handler_file_handler]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=standard
args=("logs/app.log", "a", 10485760, 5)

[handler_console_handler]
class=logging.StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[formatter_standard]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
