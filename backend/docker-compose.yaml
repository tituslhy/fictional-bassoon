services:
  citus_coordinator:
    image: citusdata/citus:14.0.0
    container_name: citus_coordinator
    platform: linux/amd64
    ports:
      - "5432:5432"
    labels:
      com.citusdata.role: Master
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus_coordinator_data:/var/lib/postgresql
      - ./docker/citus/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  citus_worker_1:
    image: citusdata/citus:14.0.0
    platform: linux/amd64
    labels:
      com.citusdata.role: Worker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus_worker_1_data:/var/lib/postgresql
    networks:
      - app_network
    depends_on:
      - citus_coordinator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  citus_worker_2:
    image: citusdata/citus:14.0.0
    platform: linux/amd64
    labels:
      com.citusdata.role: Worker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - citus_worker_2_data:/var/lib/postgresql
    networks:
      - app_network
    depends_on:
      - citus_coordinator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  citus_manager:
    container_name: citus_manager
    image: citusdata/membership-manager:0.3.0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    depends_on:
      - citus_coordinator
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - app_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    platform: linux/amd64
    ports:
      - "6432:6432"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@citus_coordinator:5432/${POSTGRES_DB}
      - LISTEN_ADDR=0.0.0.0
      - LISTEN_PORT=6432
      - AUTH_TYPE=trust
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - ADMIN_USERS=${POSTGRES_USER}
    depends_on:
      citus_coordinator:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "pgbouncer", "--version"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Exporters
  citus_coordinator_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@citus_coordinator:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      citus_coordinator:
        condition: service_healthy
    networks:
      - app_network

  citus_worker_1_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@citus_worker_1:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      citus_worker_1:
        condition: service_healthy
    networks:
      - app_network

  citus_worker_2_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@citus_worker_2:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      citus_worker_2:
        condition: service_healthy
    networks:
      - app_network

  pgbouncer_exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/pgbouncer?sslmode=disable"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - app_network

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    networks:
      - app_network
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # Prometheus metrics port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_network
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
             docker-entrypoint.sh rabbitmq-server"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5672"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      REDIS_URL: redis://redis:6379
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      citus_coordinator:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - logs:/app/logs

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uv run celery -A src.celery_app worker --loglevel=info
    ports:
      - "8001:8001" # Prometheus metrics server on 8001
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      REDIS_URL: redis://redis:6379
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      METRICS_PORT: 8001
    depends_on:
      citus_coordinator:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - logs:/app/logs

  # Monitoring Stack
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
      - celery_worker
      - citus_coordinator_exporter
      - citus_worker_1_exporter
      - citus_worker_2_exporter
      - pgbouncer_exporter
      - redis-exporter
    networks:
      - app_network

  tempo:
    image: grafana/tempo:latest
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - app_network

  alloy:
    image: grafana/alloy:latest
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./docker/monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: run --storage.path=/var/lib/alloy/data --server.http.listen-addr=127.0.0.1:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  citus_coordinator_data:
  citus_worker_1_data:
  citus_worker_2_data:
  logs:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
